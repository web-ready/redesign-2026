name: Build site

# Run this workflow whenever you push changes to src/ or build.py on the main branch
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.py'
      - '.github/workflows/build.yml'

# Allow the action to commit the rebuilt public/ folder back to the repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run build script
        run: python build.py

      - name: Commit rebuilt public/ if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/
          if git diff --staged --quiet; then
            echo "No changes to public/ — skipping commit."
          else
            git commit -m "chore: rebuild public/ from src/ [skip ci]"
            git push
          fi
