            - text: / Accessibility Statement
          - heading "Accessibility Statement" [level=1] [ref=e48]
          - generic [ref=e49]:
            - paragraph [ref=e50]: Our statement
            - paragraph [ref=e51]: We are committed to making the Oasis of Change website, along with all of our subsidiary projects and initiatives, more accessible and usable for as many people as possible, including persons with disabilities. Accessibility is not treated as a one-time task. It is an ongoing part of how we review and improve our digital presence across all of our work.
          - generic [ref=e52]:
            - generic [ref=e54]:
              - heading "How we approach accessibility" [level=2] [ref=e55]
              - generic [ref=e56]:
                - paragraph [ref=e57]: We work to improve accessibility through regular review, testing, and updates across all of our digital properties. This includes checking for usability barriers, identifying areas for improvement, and implementing changes that help make our websites more inclusive and easier to use.
                - paragraph [ref=e58]: We also work with different tools and organizations to help audit our websites and guide accessibility improvements. One of those tools is accessibilitychecker.org , which helps provide an automatically updated accessibility statement and accessibility-related reporting.
                - paragraph [ref=e59]: Our goal is to continue improving the experience over time and to take accessibility seriously as part of good digital stewardship, responsible web development, and broader inclusion. This commitment extends to all of our initiatives, including our subsidiary organizations and project websites.
            - generic [ref=e61]:
              - heading "Ongoing work" [level=2] [ref=e62]
              - generic [ref=e63]:
                - generic [ref=e64]:
                  - paragraph [ref=e65]: Review
                  - paragraph [ref=e66]: We continue to assess the accessibility of pages, components, and user journeys.
                - generic [ref=e67]:
                  - paragraph [ref=e68]: Implementation
                  - paragraph [ref=e69]: We make updates where possible to improve usability and reduce accessibility barriers.
                - generic [ref=e70]:
                  - paragraph [ref=e71]: Accountability
                  - paragraph [ref=e72]: We want this page to reflect real progress, not just a static statement.
                - generic [ref=e73]:
                  - paragraph [ref=e74]: Feedback
                  - paragraph [ref=e75]: If you encounter an accessibility issue, we encourage you to contact us so we can review it.
          - generic [ref=e76]:
            - generic [ref=e77]:
              - paragraph [ref=e78]: Conformance
              - heading "WCAG 2.2 Level AA" [level=2] [ref=e79]
              - paragraph [ref=e80]: This website targets conformance with the Web Content Accessibility Guidelines (WCAG) 2.2 at Level AA. These guidelines define how to make web content more accessible to people with disabilities. We regularly review our pages against these criteria and work to address any gaps we identify.
            - generic [ref=e81]:
              - heading "Techniques in use" [level=3] [ref=e82]
              - generic [ref=e83]:
                - generic [ref=e84]:
                  - paragraph [ref=e85]: Semantic HTML and landmarks
                  - paragraph [ref=e86]:
                    - text: Pages use semantic HTML5 elements including
                    - code [ref=e87]: <nav>
                    - text: ","
                    - code [ref=e88]: <main>
                    - text: ","
                    - code [ref=e89]: <footer>
                    - text: ","
                    - code [ref=e90]: <section>
                    - text: ", and"
                    - code [ref=e91]: <article>
                    - text: to provide meaningful structure for assistive technology.
                - generic [ref=e92]:
                  - paragraph [ref=e93]: Labeled navigation regions
                  - paragraph [ref=e94]: All navigation landmarks are labeled with ARIA attributes so screen readers can distinguish between the main navigation, footer navigation, and breadcrumb trails.
                - generic [ref=e95]:
                  - paragraph [ref=e96]: Keyboard accessibility
                  - paragraph [ref=e97]: All interactive elements are reachable and operable by keyboard. Visible focus indicators are applied across links, buttons, and form controls using outline and ring styles.
                - generic [ref=e98]:
                  - paragraph [ref=e99]: Descriptive alt text
                  - paragraph [ref=e100]:
                    - text: Every image includes descriptive alternative text. Decorative icons and SVGs are hidden from assistive technology using
                    - code [ref=e101]: aria-hidden
                    - text: .
                - generic [ref=e102]:
                  - paragraph [ref=e103]: Reduced motion support
                  - paragraph [ref=e104]:
                    - text: Animations and transitions respect the
                    - code [ref=e105]: prefers-reduced-motion
                    - text: operating system setting. When enabled, motion is disabled or minimized.
                - generic [ref=e106]:
                  - paragraph [ref=e107]: Touch and click targets
                  - paragraph [ref=e108]: Interactive elements meet a minimum target size of 44 by 44 pixels, exceeding the WCAG 2.2 AA minimum of 24 pixels, to support touch and pointer accuracy.
                - generic [ref=e109]:
                  - paragraph [ref=e110]: Language of parts
                  - paragraph [ref=e111]:
                    - text: All pages declare
                    - code [ref=e112]: lang="en"
                    - text: on the document element. Where content in another language appears, it is marked with the appropriate language attribute.
                - generic [ref=e113]:
                  - paragraph [ref=e114]: Breadcrumb navigation
                  - paragraph [ref=e115]: Most pages include a breadcrumb trail with ARIA labeling, giving users an additional way to understand their location within the site and navigate back.
                - generic [ref=e116]:
                  - paragraph [ref=e117]: Responsive and scalable design
                  - paragraph [ref=e118]: The layout adapts to different screen sizes and zoom levels. Text uses relative sizing so content remains readable when users adjust their browser text size.
          - generic [ref=e119]:
            - generic [ref=e121]:
