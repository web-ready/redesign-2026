          - text: / Introducing the WRA Platform
        - paragraph [ref=e46]: Announcement • WRA Platform
        - 'heading "Introducing the WRA Platform: Helping Nonprofits Go Digital Sustainably" [level=1] [ref=e47]'
        - paragraph [ref=e48]: We built the WRA Platform because most nonprofits can't afford good web development, and the free options out there aren't built with accessibility or sustainability in mind. Here's what the platform does and how to get involved.
        - generic [ref=e49]:
          - link "Gabriel Dalton" [ref=e50] [cursor=pointer]:
            - /url: ../gabriel-dalton.html
            - img "Gabriel Dalton" [ref=e51]
          - generic [ref=e52]:
            - link "Gabriel Dalton" [ref=e53] [cursor=pointer]:
              - /url: ../gabriel-dalton.html
            - paragraph [ref=e54]:
              - text: Founder, Oasis of Change •
              - time [ref=e55]: February 1, 2026
        - figure "Good websites shouldn't be reserved for organizations with big budgets." [ref=e56]:
          - img "Nonprofit team reviewing their new website on a shared screen" [ref=e57]
          - generic [ref=e58]: Good websites shouldn't be reserved for organizations with big budgets.
        - generic [ref=e59]:
          - heading "The digital gap for nonprofits" [level=2] [ref=e60]
          - paragraph [ref=e61]: Most nonprofits operate on tight budgets, and their websites tend to reflect that reality. Many rely on free or low-cost templates that ship with dozens of unused plugins, oversized stock images, and bloated JavaScript frameworks. The result is a site that loads slowly, scores poorly on accessibility audits, and consumes far more energy per page view than it needs to.
          - paragraph [ref=e62]: Others have no web presence at all, or maintain sites built years ago that no longer meet basic standards for mobile responsiveness, screen reader support, or security. For organizations whose work depends on public trust and community outreach, this is a serious disadvantage. A dated or inaccessible website doesn't just look unprofessional — it actively turns people away and excludes those who need services most.
          - paragraph [ref=e63]: The problem isn't that nonprofits don't care about their websites. It's that hiring a developer, paying for decent hosting, and maintaining a site over time costs money they don't have. The free tools out there rarely prioritize sustainability or accessibility in any real way.
          - heading "What the WRA Platform does" [level=2] [ref=e64]
          - paragraph [ref=e65]:
            - text: The
            - link "WRA Platform" [ref=e66] [cursor=pointer]:
              - /url: ../wra_platform.html
            - text: connects nonprofits with the tools, guidance, and funding they need to get a website that works, without requiring a tech team or a large budget.
          - paragraph [ref=e67]: It does two things. It helps organizations build or rebuild their sites using lightweight, energy-efficient approaches that meet WCAG accessibility standards. And it connects qualifying organizations with digital grants to cover development, hosting, and ongoing maintenance costs.
          - paragraph [ref=e68]: "It isn't a website builder in the traditional sense. Think of it more as a guided process: assessment, recommendations, and grant matching. Organizations come in with a need and the platform helps them figure out a realistic path forward."
          - heading "How it works" [level=2] [ref=e69]
          - paragraph [ref=e70]: The process begins with an assessment of the organization's current digital presence. If they have an existing website, the platform evaluates its page weight, accessibility compliance, mobile responsiveness, and estimated carbon output per visit. If they don't have a site, the assessment focuses on their organizational needs, audience, and capacity.
          - paragraph [ref=e71]: Based on that assessment, the platform generates a set of recommendations tailored to the organization's situation. These might include migrating to a green hosting provider, rebuilding with a static site generator to reduce server load, optimizing images and fonts, or restructuring content for better accessibility. Each recommendation comes with a clear explanation of why it matters and what the expected impact will be.
          - paragraph [ref=e72]: For organizations that qualify, the platform then matches them with available digital grants. These grants can cover partial or full costs of implementation, depending on the organization's size, budget, and the scope of work involved. The goal is to remove the financial barrier that keeps so many nonprofits stuck with inadequate digital infrastructure.
          - generic [ref=e73]:
            - paragraph [ref=e74]: Our belief
            - paragraph [ref=e75]: "\"Every nonprofit deserves a website that reflects the quality of their mission — one that is fast, accessible, and built without unnecessary environmental cost.\""
          - heading "Who it's for" [level=2] [ref=e76]
          - paragraph [ref=e77]: Small and mid-size nonprofits, community organizations, and mission-driven groups without dedicated tech staff. If you've ever struggled to find affordable web development, or settled for a template that doesn't actually serve your audience, this was built for you.
          - paragraph [ref=e78]: That includes food banks, neighborhood associations, youth programs, environmental groups, cultural organizations, mutual aid networks, anyone doing real work without the budget for professional digital help. It's especially useful for organizations that want their website to reflect their values around sustainability and inclusion.
          - paragraph [ref=e79]: You don't need to be technical. The assessment and recommendation process is designed to make sense to anyone. If you qualify for a grant, experienced developers handle the implementation.
          - heading "How to get started" [level=2] [ref=e80]
          - paragraph [ref=e81]:
            - link "Submit an inquiry" [ref=e82] [cursor=pointer]:
              - /url: ../get_involved.html
            - text: through our involvement page. Someone from the team will follow up and help you start the assessment process.
          - paragraph [ref=e83]:
            - text: If you have questions about eligibility, the grant process, or anything else, reach out through our
            - link "contact page" [ref=e84] [cursor=pointer]:
              - /url: ../contact.html
            - text: . We're happy to walk through the details.
          - paragraph [ref=e85]: A good website shouldn't be a luxury. The WRA Platform is our attempt to make sure it isn't.
