      - region "The internet has a footprint — and most people never see it." [ref=e67]:
        - generic [ref=e68]:
          - paragraph [ref=e69]: Why this talk matters
          - heading "The internet has a footprint — and most people never see it." [level=2] [ref=e70]
          - generic [ref=e71]:
            - paragraph [ref=e72]: Every page load, app session, and AI prompt uses electricity, moves data through global networks, and runs on hardware that someone built and someone has to power. Multiply that by billions of people and the footprint becomes meaningful — comparable in scale to entire industries.
            - paragraph [ref=e73]: The good news is that digital sustainability is highly fixable. Lighter websites, smarter hosting, efficient code, and more thoughtful AI use can cut emissions, energy, and water — without giving up the experience. This talk is for students, nonprofits, businesses, and community leaders who want a clear way to think about it.
      - region "Gabriel Dalton" [ref=e74]:
        - generic [ref=e76]:
          - img "Gabriel Dalton, founder of Oasis of Change and TEDx speaker" [ref=e78]
          - generic [ref=e79]:
            - paragraph [ref=e80]: About the speaker
            - heading "Gabriel Dalton" [level=2] [ref=e81]
            - paragraph [ref=e82]: Gabriel is the founder of Oasis of Change, a Vancouver-based nonprofit focused on digital sustainability and climate-conscious technology. He started coding at 10 and has spent the years since trying to make the invisible parts of the internet visible.
            - paragraph [ref=e83]: His work has supported Stanley Park Ecology Society, Plastic Bank, and The Dais at Toronto Metropolitan University. In 2025 he received the Youth Impact in Innovation Award at the City of Vancouver Awards of Excellence, and in February 2026 he gave this TEDx talk on why digital sustainability belongs in modern tech and AI literacy.
            - link "Read Gabriel's full biography" [ref=e84] [cursor=pointer]:
              - /url: gabriel-dalton.html
              - text: Read Gabriel's full biography
              - img [ref=e85]
      - region "Five takeaways you can act on." [ref=e87]:
        - generic [ref=e88]:
          - paragraph [ref=e89]: Key ideas from the talk
          - heading "Five takeaways you can act on." [level=2] [ref=e90]
          - list [ref=e91]:
            - listitem [ref=e92]:
              - generic [ref=e93]: "01"
              - heading "The internet has an environmental footprint" [level=3] [ref=e94]
              - paragraph [ref=e95]: Data centres, networks, and the devices we browse on all use energy. Every site contributes — but most contributions are invisible.
            - listitem [ref=e96]:
              - generic [ref=e97]: "02"
              - heading "AI makes digital efficiency more important" [level=3] [ref=e98]
              - paragraph [ref=e99]: AI workloads consume large amounts of electricity and water. As AI gets used everywhere, efficiency choices compound quickly.
            - listitem [ref=e100]:
              - generic [ref=e101]: "03"
              - heading "Faster, cleaner websites use less energy" [level=3] [ref=e102]
              - paragraph [ref=e103]: Lighter pages move less data, render faster on older devices, and reduce emissions across the supply chain — and they're better for users.
            - listitem [ref=e104]:
              - generic [ref=e105]: "04"
              - heading "Sustainable tech is part of digital literacy" [level=3] [ref=e106]
              - paragraph [ref=e107]: Knowing how technology uses energy is becoming as fundamental as knowing how to evaluate a source online. It belongs in classrooms.
            - listitem [ref=e108]:
              - generic [ref=e109]: "05"
              - heading "Small organizations can take real steps" [level=3] [ref=e110]
              - paragraph [ref=e111]: Nonprofits, schools, and small teams don't need a huge budget. Better hosting, lighter pages, and clearer choices add up to measurable change.
            - listitem [ref=e112]:
              - generic [ref=e113]: →
              - heading "Want the full picture?" [level=3] [ref=e114]
              - paragraph [ref=e115]: Watch the talk to hear the examples, the data, and the practical steps Gabriel walks through.
              - link "Watch the TEDx talk" [ref=e116] [cursor=pointer]:
                - /url: "#watch"
