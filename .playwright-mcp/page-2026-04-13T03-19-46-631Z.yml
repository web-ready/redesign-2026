            - generic [ref=e52]:
              - img "Founded in 2024" [ref=e53]
              - paragraph [ref=e54]: Oasis of Change was founded to promote digital sustainability through low-carbon, energy-efficient websites and practical innovation that helps people rethink the environmental impact of technology.
        - generic [ref=e56]:
          - generic [ref=e58]:
            - paragraph [ref=e59]: Our Mission
            - paragraph [ref=e60]: To promote digital sustainability.
          - generic [ref=e62]:
            - paragraph [ref=e63]: Our Vision
            - paragraph [ref=e64]: A future where digital sustainability is a core part of how people build, use, and understand technology, with lower-impact digital practices clearly understood, widely adopted, and recognized as a standard of responsible technology.
        - generic [ref=e67]:
          - paragraph [ref=e68]: How Oasis of Change was founded
          - generic [ref=e69]:
            - generic [ref=e70]:
              - paragraph [ref=e71]: "01"
              - heading "A problem was identified" [level=2] [ref=e72]
              - paragraph [ref=e73]: Gabriel first encountered the internet's energy use when he learned that a single Google search uses enough energy to power a 10-watt light bulb for 108 seconds. That single fact opened a wider question about how websites and online systems are built.
            - generic [ref=e74]:
              - paragraph [ref=e75]: "02"
              - heading "Two interests came together" [level=2] [ref=e76]
              - paragraph [ref=e77]: "Web development and sustainability were combined into one focused direction: creating lower-impact digital experiences."
            - generic [ref=e78]:
              - paragraph [ref=e79]: "03"
              - heading "A mission took shape" [level=2] [ref=e80]
              - paragraph [ref=e81]: Oasis of Change was founded to prove that digital sustainability is not only possible, but something that can be implemented at scale.
        - generic [ref=e84]:
          - img "Gabriel Dalton portrait" [ref=e87]
          - generic [ref=e88]:
            - paragraph [ref=e89]: Founder
            - heading "Gabriel Dalton" [level=2] [ref=e90]
            - paragraph [ref=e91]: Gabriel Dalton is the founder of Oasis of Change, a nonprofit focused on digital sustainability and climate-conscious technology. After teaching himself to code at age 10, he began exploring how websites and digital infrastructure impact energy consumption, emissions, and global resources.
            - paragraph [ref=e92]: Today his work focuses on building low-carbon websites, improving digital efficiency, and helping organizations reduce the environmental footprint of the internet. His work in sustainable web development earned him the Youth Impact & Innovation Award at the 2025 Vancouver Awards.
