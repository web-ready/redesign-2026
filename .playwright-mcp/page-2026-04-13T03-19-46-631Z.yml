          - generic [ref=e112]:
            - generic [ref=e113]:
              - heading "Transparency & Integrity" [level=3] [ref=e114]
              - paragraph [ref=e115]: We believe trust matters. We are committed to being honest, accountable, and clear about our work so that the impact we create is real, measurable, and credible.
            - generic [ref=e116]:
              - heading "Sustainability" [level=3] [ref=e117]
              - paragraph [ref=e118]: We strive to ensure that our projects create meaningful impact in ways that are environmentally and operationally sustainable over the long term.
            - generic [ref=e119]:
              - heading "Accessibility" [level=3] [ref=e120]
              - paragraph [ref=e121]: We are committed to making our platforms, projects, and subsidiaries accessible and inclusive, including for persons with disabilities.
            - generic [ref=e122]:
              - heading "Innovation" [level=3] [ref=e123]
              - paragraph [ref=e124]: We believe progress requires fresh thinking. We are committed to developing new ideas and solutions rather than remaining stuck in outdated ways of doing things.
            - generic [ref=e125]:
              - heading "Community" [level=3] [ref=e126]
              - paragraph [ref=e127]: We recognize that lasting change is strongest when people work together. We value alignment with the communities we serve, including the Vancouver community, to create more meaningful and effective impact.
            - generic [ref=e128]:
              - heading "Impact" [level=3] [ref=e129]
              - paragraph [ref=e130]: At the heart of everything we do is a commitment to creating real change. Through accessibility, innovation, sustainability, and community building, we aim to make a meaningful impact.
