<!DOCTYPE html>
<html lang="en">
<head>
    <title>Page title</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/tailwind/tailwind.min.css">
    <link rel="icon" type="image/png" sizes="32x32" href="shuffle-for-tailwind.png">
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js" defer></script>
</head>
<body class="antialiased bg-body text-body font-body">
    <div class="">
                
      <section class="px-4 md:px-8 py-12 md:py-16 ">
        <div class="max-w-[1200px] mx-auto">
          <div class="flex flex-wrap -m-4 items-center">
            <!-- TEXT -->
            <div class="w-full lg:w-1/2 p-4">
              <div class="flex flex-col justify-between gap-10 h-full">
                <div>
                  <p class="text-[11px] md:text-xs font-semibold tracking-[0.22em] uppercase text-gray-500 mb-4">Environmental Partnership</p>
                  <h2 class="font-heading tracking-tight text-4xl md:text-5xl lg:text-6xl font-medium mb-6 max-w-lg">Reinvesting into reforestation</h2>
                  <p class="text-gray-700 text-base md:text-lg leading-8 max-w-lg mb-8" spellcheck="false">Through our collaboration with Tree-Nation, a large portion of the funds from our projects are reinvested into global reforestation including supporting endangered species around the world.</p>
                  <a href="#" class="bg-black h-14 rounded-full px-6 py-4 inline-flex items-center justify-center gap-2 hover:bg-gray-900 transition duration-200">
                    <span class="tracking-tight font-semibold text-white">Explore our environmental impact</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewbox="0 0 16 16" fill="none">
                      <path d="M14 6.66669H7.33333C4.38781 6.66669 2 9.0545 2 12V13.3334M14 6.66669L10 10.6667M14 6.66669L10 2.66669" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                  </a>
                </div>
              </div>
            </div>
            <!-- IMAGE -->
            <div class="w-full lg:w-1/2 p-4">
              <div class="bg-gray-50 border border-gray-200 rounded-[32px] p-10 flex items-center justify-center">
                <img src="images/image-1.webp" alt="Tree-Nation reforestation partnership" class="max-h-[140px] md:max-h-[180px] w-auto object-contain" loading="lazy">
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
</body>
</html>
